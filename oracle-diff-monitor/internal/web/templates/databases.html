{{define "content"}}
<div class="flex justify-between items-center mb-6">
    <div>
        <h1 class="text-2xl font-bold text-gray-900">数据库管理</h1>
        <p class="mt-1 text-sm text-gray-500">管理 Oracle 数据库连接配置</p>
    </div>
    <a href="/databases/new" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700">添加数据库</a>
</div>
<div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">名称</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">主机</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">端口</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">服务名</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">用户</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th></tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            {{range .databases}}
            <tr class="hover:bg-gray-50">
                <td class="px-6 py-4 text-sm font-medium text-gray-900">{{.Name}}</td>
                <td class="px-6 py-4 text-sm text-gray-500">{{.Host}}</td>
                <td class="px-6 py-4 text-sm text-gray-500">{{.Port}}</td>
                <td class="px-6 py-4 text-sm text-gray-500">{{if .ServiceName}}{{.ServiceName}}{{else}}{{.SID}}{{end}}</td>
                <td class="px-6 py-4 text-sm text-gray-500">{{.Username}}</td>
                <td class="px-6 py-4 text-sm space-x-2">
                    <button onclick="testConn({{.ID}})" class="text-green-600 hover:text-green-800 text-sm">测试</button>
                    <a href="/databases/{{.ID}}/edit" class="text-blue-600 hover:text-blue-800 text-sm">编辑</a>
                    <form action="/databases/{{.ID}}/delete" method="POST" class="inline" onsubmit="return confirm('确定删除?')">
                        <button type="submit" class="text-red-600 hover:text-red-800 text-sm">删除</button>
                    </form>
                </td>
            </tr>
            {{else}}<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">暂无数据库配置</td></tr>{{end}}
        </tbody>
    </table>
</div>
<div id="test-result" class="mt-4"></div>
<script>
function testConn(id) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/databases/' + id + '/test', true);
    xhr.onload = function() {
        var d = JSON.parse(xhr.responseText);
        var div = document.getElementById('test-result');
        div.className = d.success ? 'bg-green-50 text-green-700 p-3 rounded' : 'bg-red-50 text-red-700 p-3 rounded';
        div.textContent = d.message;
    };
    xhr.send();
}
</script>
{{end}}
{{template "layout.html" .}}
